<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: file: https:; img-src 'self' data: file: https:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; base-uri 'none'; form-action 'self';" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="styles.css" />
  <title>Pet</title>
</head>
<body class="pet-root">
  <div class="pet-shell" id="petShell">
    <div class="pet-aura" id="petAura"></div>

    <div class="pet-bubble" id="petBubble">今天也要被温柔地推进一点点。</div>

    <div class="visitor" id="visitor">
      <div class="visitor-bubble" id="visitorBubble">我来串门啦。</div>
      <div class="visitor-card">
        <div class="visitor-inner" id="visitorInner">
          <div class="pet-face">👋</div>
        </div>
        <div class="visitor-name" id="visitorName">访客</div>
      </div>
    </div>

    <div class="pet-card" id="petCard">
      <div class="pet-inner" id="petInner"><div class="pet-face">😊</div></div>
      <div class="pet-tag" id="petTag">专注 25:00</div>
    </div>

    <div class="pet-actions">
      <button class="icon-btn" id="openBtn" title="打开控制台">⚙️</button>
    </div>
  </div>

  <script src="renderer-config.js"></script>
  <script src="sound-player.js"></script>
  <script src="pet.js"></script>
</body>
</html>
